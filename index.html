

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  
  <title>커스터드 푸딩 찾기</title>

  <meta property="og:title" content="커스터드 푸딩 찾기">
  <meta property="og:description" content="귀여운 푸딩을 터뜨리지 않고 모두 찾아보세요!">
  <meta property="og:image" content="https://hamudacc.github.io/pudding-sweeper/pudding.png" />
    <meta property="og:url" content="https://hamudacc.github.io/pudding-sweeper/" />

  <link rel="icon" href="pudding.png" type="image/png">
  
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent}
#app{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:16px 10px;width:100vw;overflow-x:hidden}
#panel {
  display: flex;
  align-items: center;
  justify-content: space-between; /* 양 끝 정렬 */
  width: 100%;
  max-width: 430px;
  background: #fff8e1;
  border: 2px solid #e6a800;
  border-radius: 20px;
  padding: 8px 10px; /* 좌우 패딩을 줄여 공간 확보 */
  margin-bottom: 10px;
  box-shadow: 0 4px 0 #b87800, inset 0 1px 0 rgba(255,255,255,0.9);
}
.info-label{font-size:11px;color:#8a5e10;letter-spacing:0.04em;font-weight:600}
.info-value{font-size:22px;font-weight:700;color:#6b3e08;font-variant-numeric:tabular-nums;min-width:44px;text-align:center}
.info-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  width: 80px; /* 각 정보 박스 너비를 고정하여 푸딩 버튼을 중앙으로 밀어냄 */
}
#reset-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s;
  flex-shrink: 0;
  background: transparent;
  padding: 0;
  margin: 0;
  outline: none; /* 이 줄을 추가하시면 됩니다 */
}
#reset-btn:hover{transform:scale(1.12) rotate(-4deg)}
#reset-btn:active{transform:scale(0.9)}
#reset-btn svg{width:72px;height:72px;display:block;overflow:visible}
#board-wrap {
  position: relative;
  background: linear-gradient(160deg,#fff3c0,#ffe680);
  border: 2.5px solid #d4a030;
  border-radius: 24px;
  padding: 12px;
  width: 90%;
  max-width: 440px;
  box-shadow: 0 6px 0 #b07818, inset 0 2px 6px rgba(255,255,200,0.8);
  
 
  overflow: hidden; 
  box-sizing: border-box; /* 패딩이 전체 너비에 포함되도록 강제 */
  display: inline-block;  /* 박스가 내용물 크기에 맞춰지도록 */
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 4px;
  width: 100%;
  /* 여기에 최대 너비를 주어 블록이 화면 전체를 덮지 않게 */
  max-width: 400px; 
  margin: 0 auto;
}
.cell{width:100%;aspect-ratio:1/1;border-radius:12px;border:none;cursor:pointer;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;user-select:none;position:relative;overflow:hidden;transition:transform 0.12s,box-shadow 0.12s}
.cell.hidden{background:#f0a800;box-shadow:0 5px 0 #a06800,0 6px 8px rgba(120,70,0,0.3),inset 0 1px 0 rgba(255,220,80,0.9),inset 0 -2px 4px rgba(140,80,0,0.4)}
.cell.hidden::before{content:'';position:absolute;top:3px;left:6px;right:6px;height:40%;background:linear-gradient(180deg,rgba(255,255,255,0.6) 0%,rgba(255,255,255,0) 100%);border-radius:50% 50% 50% 50%/80% 80% 20% 20%;pointer-events:none}
.cell.hidden::after{content:'';position:absolute;top:4px;left:8px;width:7px;height:5px;background:rgba(255,255,255,0.75);border-radius:50%;pointer-events:none}
.cell.hidden:hover{transform:scale(1.14) translateY(-3px);background:#ffb800;box-shadow:0 8px 0 #a06800,inset 0 1px 0 rgba(255,230,100,0.95),inset 0 -2px 4px rgba(140,80,0,0.4)}
.cell.hidden:active{transform:scale(0.91) translateY(3px);box-shadow:0 1px 0 #a06800,inset 0 2px 6px rgba(140,80,0,0.5)}
.cell.flagged{background:#f0a800;box-shadow:0 5px 0 #a06800,inset 0 1px 0 rgba(255,220,80,0.9),inset 0 -2px 4px rgba(140,80,0,0.4);font-size:17px}
.cell.flagged::before{content:'';position:absolute;top:3px;left:6px;right:6px;height:40%;background:linear-gradient(180deg,rgba(255,255,255,0.55) 0%,rgba(255,255,255,0) 100%);border-radius:50% 50% 50% 50%/80% 80% 20% 20%;pointer-events:none}
.cell.flagged::after{content:'';position:absolute;top:4px;left:8px;width:7px;height:5px;background:rgba(255,255,255,0.7);border-radius:50%;pointer-events:none}
.cell.flagged:hover{transform:scale(1.1)}
.cell.revealed{background:rgba(255,235,130,0.38);box-shadow:inset 0 2px 5px rgba(160,100,0,0.22);cursor:default;border-radius:9px}
.cell.mine-hit{background:linear-gradient(145deg,#ff8844,#ff4400);box-shadow:0 4px 0 #cc2200,inset 0 1px 0 rgba(255,180,100,0.8);font-size:18px}
.cell.mine-shown{background:rgba(255,235,130,0.38);font-size:17px;border-radius:9px;box-shadow:inset 0 2px 5px rgba(160,100,0,0.22)}
.cell.wrong-flag{background:linear-gradient(145deg,#ff9980,#ff5533);box-shadow:0 3px 0 #cc3300;font-size:17px}
.n1{color:#1a4db3}.n2{color:#1a7a38}.n3{color:#b01a1a}.n4{color:#3a1a99}.n5{color:#993300}.n6{color:#006688}.n7{color:#443300}.n8{color:#223344}
#overlay{position:absolute;inset:0;border-radius:22px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:50;overflow:hidden}
#overlay.show{display:flex}
#overlay-bg{position:absolute;inset:0;background:rgba(60,30,0,0.62);backdrop-filter:blur(3px)}
#overlay-box{position:relative;z-index:2;background:#fff8e1;border:2.5px solid #e6a800;border-radius:22px;padding:22px 36px;text-align:center;box-shadow:0 6px 0 #b07818,inset 0 1px 0 rgba(255,255,200,0.9);overflow:hidden;min-width:220px}
#overlay-splatter{position:absolute;inset:0;pointer-events:none;z-index:3;border-radius:22px}
#overlay-title{
  position:relative;z-index:4;
  font-size:26px;font-weight:700;
  color:#7a4400;display:block;margin-bottom:6px;
  /* 흰색 아웃라인 */
  text-shadow:
    -2.5px -2.5px 0 #fff,
     2.5px -2.5px 0 #fff,
    -2.5px  2.5px 0 #fff,
     2.5px  2.5px 0 #fff,
     0   -2.5px 0 #fff,
     0    2.5px 0 #fff,
    -2.5px  0   0 #fff,
     2.5px  0   0 #fff;
}
#overlay-sub{
  position:relative;z-index:4;
  font-size:13px;color:#7a3c00;display:block;font-weight:600;
  text-shadow:
    -2px -2px 0 #fff,
     2px -2px 0 #fff,
    -2px  2px 0 #fff,
     2px  2px 0 #fff,
     0     -2px 0 #fff,
     0      2px 0 #fff,
    -2px  0     0 #fff,
     2px  0     0 #fff;
}
#pudding-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none !important; /* 클릭 통과 강제 */
  z-index: 40;
  border-radius: 22px;
}
#splatter-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none !important; /* 클릭 통과 강제 */
  z-index: 35;
  border-radius: 22px;
}
.cell.jiggle{animation:jiggle 0.4s cubic-bezier(.36,.07,.19,.97)}
@keyframes jiggle{0%{transform:scale(1)}15%{transform:scale(1.22,0.78)}30%{transform:scale(0.88,1.18)}45%{transform:scale(1.12,0.9)}60%{transform:scale(0.95,1.06)}75%{transform:scale(1.04,0.97)}100%{transform:scale(1)}}
.cell.pop{animation:pop 0.22s ease forwards}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.35)}100%{transform:scale(0) rotate(25deg);opacity:0}}
.face{display:none}.face.active{display:block}
#start-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 35px 5px;
  width: 90%;
  max-width: 320px;
  text-align: center;
  background: #fff8e1;
  border: 2.5px solid #e6a800;
  border-radius: 24px;
  box-shadow: 0 6px 0 #b07818;
  margin-bottom: 5px; /* 아래 조작법 박스와의 간격 */
  gap: 16px; /* 로고/제목과 버튼 사이의 간격을 크게 띄움 */
}
.game-title{font-size:22px;font-weight:800;color:#6b3e08;margin-top:10px;letter-spacing:-0.02em}
#start-btn{padding:14px 36px;font-size:16px;font-weight:700;color:#fff;background:linear-gradient(145deg,#ffb800,#f0a800);border:none;border-radius:16px;cursor:pointer;box-shadow:0 5px 0 #a06800;transition:transform 0.1s}
#start-btn:hover{transform:scale(1.05)}
#start-btn:active{transform:scale(0.95) translateY(3px);box-shadow:0 2px 0 #a06800}
.guide-box{margin-top:15px;width:90%;max-width:320px;text-align:center}
.guide-title{font-size:13px;font-weight:700;color:#8a5e10;margin-bottom:8px}
.guide-restart{font-size:11.5px;color:#a06020;text-align:center;margin-bottom:7px;background:#fff3c0;padding:6px;border-radius:8px;font-weight:500}
.guide-restart strong{color:#6b3e08}
.guide-content{display:flex;gap:12px}
.guide-item{flex:1;background:rgba(255,248,225,0.6);border-radius:10px;padding:10px;font-size:11px;color:#6b3e08;line-height:1.6}
.guide-device{display:inline-block;font-size:11px;font-weight:700;color:#fff;background:#d4a030;padding:2px 6px;border-radius:6px;margin-bottom:5px}
.highlight-click{color:#1a7a38}.highlight-flag{color:#b01a1a}
  
  .start-logo svg {
  margin-bottom: -30px !important; /* 아래쪽 간격을 강제로 줄임 */
  margin-top: -40px !important;    /* 위쪽 간격을 강제로 줄임 */
}
  
</style>
</head>
  
<body>
<div id="app">
  <div id="start-screen">
    <div class="start-logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:170px;height:170px;display:block;margin:0 auto 10px auto">
        <path d="M 25 75 Q 20 75 25 45 Q 40 40 50 40 Q 60 40 75 45 Q 80 75 75 75 Q 50 82 25 75 Z" fill="#FFEB80" stroke="#6B3E08" stroke-width="3" stroke-linejoin="round"/>
        <path d="M 25 45 Q 23 32 50 31 Q 77 32 75 45 Q 50 53 25 45 Z" fill="#995500" stroke="#6B3E08" stroke-width="3" stroke-linejoin="round"/>
        <path d="M 30.5 41.8 Q 40 44.7 50 44.5" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
        <circle cx="54.1" cy="44.2" r="1.3" fill="#FFFFFF" opacity="0.8"/>
        <ellipse cx="34" cy="61" rx="4" ry="2.5" fill="#FF9999"/>
        <ellipse cx="66" cy="61" rx="4" ry="2.5" fill="#FF9999"/>
        <circle cx="42" cy="57" r="3" fill="#6B3E08"/><circle cx="41" cy="56" r="0.8" fill="#FFFFFF"/>
        <circle cx="58" cy="57" r="3" fill="#6B3E08"/><circle cx="57" cy="56" r="0.8" fill="#FFFFFF"/>
        <path d="M 47 62 Q 50 65 53 62" stroke="#6B3E08" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      <h1 class="game-title">커스터드 푸딩 찾기</h1>
    </div>
    
    <button id="start-btn">게임 시작하기</button>
  </div>

  <div id="panel" style="display:none">
    <div class="info-box">
      <span class="info-label">🍮 남은 푸딩</span>
      <span class="info-value" id="mine-count">10</span>
    </div>
    <button id="reset-btn" aria-label="다시 시작">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:64px;height:64px">
        <path d="M 25 75 Q 20 75 25 45 Q 40 40 50 40 Q 60 40 75 45 Q 80 75 75 75 Q 50 82 25 75 Z" fill="#FFEB80" stroke="#6B3E08" stroke-width="3.5" stroke-linejoin="round"/>
        <path d="M 25 45 Q 23 32 50 31 Q 77 32 75 45 Q 50 53 25 45 Z" fill="#995500" stroke="#6B3E08" stroke-width="3.5" stroke-linejoin="round"/>
        <path d="M 30.5 41.8 Q 40 44.7 50 44.5" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
        <circle cx="54.1" cy="44.2" r="1.3" fill="#FFFFFF" opacity="0.8"/>
        <ellipse cx="34" cy="61" rx="4" ry="2.5" fill="#FF9999"/>
        <ellipse cx="66" cy="61" rx="4" ry="2.5" fill="#FF9999"/>
        <g class="face active" id="face-normal">
          <circle cx="42" cy="57" r="3" fill="#6B3E08"/><circle cx="41" cy="56" r="0.8" fill="#FFFFFF"/>
          <circle cx="58" cy="57" r="3" fill="#6B3E08"/><circle cx="57" cy="56" r="0.8" fill="#FFFFFF"/>
          <path d="M 47 62 Q 50 65 53 62" stroke="#6B3E08" stroke-width="3" fill="none" stroke-linecap="round"/>
        </g>
        <g class="face" id="face-dead">
          <path d="M 39 55 L 44 59 L 39 63" stroke="#6B3E08" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M 61 55 L 56 59 L 61 63" stroke="#6B3E08" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M 47 65 Q 50 61 53 65" stroke="#6B3E08" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M 43 63 Q 40 71 43 72 Q 46 71 43 63" fill="#A0D8EF" stroke="#6B3E08" stroke-width="1.5"/>
          <path d="M 57 63 Q 60 71 57 72 Q 54 71 57 63" fill="#A0D8EF" stroke="#6B3E08" stroke-width="1.5"/>
        </g>
        <g class="face" id="face-happy">
          <circle cx="42" cy="57" r="3" fill="#6B3E08"/><circle cx="41" cy="56" r="0.8" fill="#FFFFFF"/>
          <circle cx="58" cy="57" r="3" fill="#6B3E08"/><circle cx="57" cy="56" r="0.8" fill="#FFFFFF"/>
          <path d="M 45 62 Q 50 67 55 62" stroke="#6B3E08" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M 37 54 L 47 54 Q 47 60 42 60 Q 37 60 37 54 Z" fill="#333"/>
          <path d="M 53 54 L 63 54 Q 63 60 58 60 Q 53 60 53 54 Z" fill="#333"/>
          <circle cx="44.5" cy="55" r="0.7" fill="#FFFFFF" opacity="0.8"/>
          <circle cx="60.5" cy="55" r="0.7" fill="#FFFFFF" opacity="0.8"/>
        </g>
      </svg>
    </button>
    <div class="info-box">
      <span class="info-label">⏱ 시간</span>
      <span class="info-value" id="timer">0</span>
    </div>
  </div>

  <div id="board-wrap" style="display:none">
    <div id="board"></div>
    <canvas id="splatter-canvas"></canvas>
    <canvas id="pudding-canvas"></canvas>
    <div id="overlay">
      <div id="overlay-bg"></div>
      <div id="overlay-box">
        <canvas id="overlay-splatter"></canvas>
        <span id="overlay-title"></span>
        <span id="overlay-sub"></span>
      </div>
    </div>
  </div>

  <div class="guide-box">
    <p class="guide-title">🎮 조작 방법 안내</p>
    <p class="guide-restart">💡 상단 중앙 <strong>푸딩 아이콘</strong>을 누르면 재시작됩니다.</p>
    <div class="guide-content">
      <div class="guide-item"><span class="guide-device">PC (마우스)</span>
        <p>• <strong class="highlight-click">좌클릭</strong>: 타일 열기</p>
        <p>• <strong class="highlight-flag">우클릭</strong>: 🚩 깃발</p>
      </div>
      <div class="guide-item"><span class="guide-device">모바일 (터치)</span>
        <p>• <strong class="highlight-click">터치</strong>: 타일 열기</p>
        <p>• <strong class="highlight-flag">길게 누르기</strong>: 🚩 깃발</p>
      </div>
    </div>
  </div>
</div>

<script>
const ROWS=8,COLS=8,MINES=10;
let board=[],revealed=[],flagged=[],gameState='idle',timerInterval=null,seconds=0,firstClick=true;
let pudParticles=[],rafId=null;

const canvas=document.getElementById('pudding-canvas');
const ctx=canvas.getContext('2d');
const sCanvas=document.getElementById('splatter-canvas');
const sCtx=sCanvas.getContext('2d');
const oCanvas=document.getElementById('overlay-splatter');
const oCtx=oCanvas.getContext('2d');

function resizeCanvas(){
  const w = document.getElementById('board-wrap');
  if(!w) return;
  const W = w.offsetWidth, H = w.offsetHeight;
  
  // style.cssText로 한 번에 덮어쓰지 말고, 필요한 속성만 지정
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W;
  canvas.height = H;
  
  sCanvas.style.width = W + 'px';
  sCanvas.style.height = H + 'px';
  sCanvas.width = W;
  sCanvas.height = H;
}
function resizeOverlayCanvas(){
  const box=document.getElementById('overlay-box');if(!box)return;
  oCanvas.width=box.offsetWidth;oCanvas.height=box.offsetHeight;
}
function setFace(name){
  document.querySelectorAll('.face').forEach(f=>f.classList.remove('active'));
  const el=document.getElementById('face-'+name);if(el)el.classList.add('active');
}
function initBoard(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  revealed=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  flagged=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  gameState='idle';firstClick=true;
  clearInterval(timerInterval);seconds=0;
  document.getElementById('timer').textContent='0';
  document.getElementById('mine-count').textContent=MINES;
  setFace('normal');
  document.getElementById('overlay').classList.remove('show');
  pudParticles=[];cancelAnimationFrame(rafId);
  sCtx.clearRect(0,0,sCanvas.width,sCanvas.height);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  oCtx.clearRect(0,0,oCanvas.width,oCanvas.height);
  render();setTimeout(resizeCanvas,50);
}
function placeMines(safeR,safeC){
  const safe=new Set();
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=safeR+dr,nc=safeC+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)safe.add(nr*COLS+nc);}
  let placed=0;
  while(placed<MINES){const idx=Math.floor(Math.random()*ROWS*COLS),r=Math.floor(idx/COLS),c=idx%COLS;if(!safe.has(idx)&&board[r][c]!==-1){board[r][c]=-1;placed++;}}
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(board[r][c]===-1)continue;let cnt=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]===-1)cnt++;}
    board[r][c]=cnt;
  }
}
function startTimer(){timerInterval=setInterval(()=>{seconds++;document.getElementById('timer').textContent=seconds;},1000);}
function countFlags(){let f=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(flagged[r][c])f++;return f;}
function updateMineCount(){document.getElementById('mine-count').textContent=MINES-countFlags();}
function getCellEl(r,c){return document.querySelector(`[data-r="${r}"][data-c="${c}"]`);}
function reveal(r,c){
  if(r<0||r>=ROWS||c<0||c>=COLS||revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;
  const el=getCellEl(r,c);if(el){el.classList.remove('jiggle');void el.offsetWidth;el.classList.add('jiggle');}
  if(board[r][c]===0)for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)reveal(r+dr,c+dc);
}
function checkWin(){for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]!==-1&&!revealed[r][c])return false;return true;}

/* ── 얼룩 유틸 ── */
function drawBlot(c,x,y,r,color){
  c.save();c.translate(x,y);c.rotate(Math.random()*Math.PI*2);
  c.beginPath();
  const pts=7+Math.floor(Math.random()*5);
  for(let i=0;i<pts;i++){
    const a=(i/pts)*Math.PI*2,rad=r*(0.55+Math.random()*0.55);
    i===0?c.moveTo(Math.cos(a)*rad,Math.sin(a)*rad):c.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
  }
  c.closePath();c.fillStyle=color;c.fill();
  c.beginPath();c.ellipse(-r*0.15,-r*0.2,r*0.22,r*0.13,-0.5,0,Math.PI*2);
  c.fillStyle='rgba(255,220,150,0.25)';c.fill();
  c.restore();
}
function drawDrip(c,sx,sy,ex,ey,w,color){
  c.save();c.beginPath();c.moveTo(sx,sy);
  const mx=(sx+ex)/2+(Math.random()-0.5)*w*3,my=(sy+ey)/2+(Math.random()-0.5)*w*2;
  c.quadraticCurveTo(mx,my,ex,ey);
  c.strokeStyle=color;c.lineWidth=w;c.lineCap='round';c.stroke();
  c.beginPath();c.ellipse(ex,ey,w*0.9,w*1.4,0,0,Math.PI*2);c.fillStyle=color;c.fill();
  c.restore();
}

/* ── 게임판 얼룩 (드립 포함) ── */
function drawBoardSplatter(hitR,hitC){
  resizeCanvas();
  const W=sCanvas.width,H=sCanvas.height;
  const pad=12,cellSize=(W-pad*2-4*7)/8,gap=4;
  const cx=pad+hitC*(cellSize+gap)+cellSize/2;
  const cy=pad+hitR*(cellSize+gap)+cellSize/2;
  const cols=['rgba(120,60,0,0.82)','rgba(150,80,10,0.75)','rgba(90,40,0,0.88)','rgba(180,100,10,0.65)','rgba(60,25,0,0.9)'];
  drawBlot(sCtx,cx,cy,cellSize*1.2,cols[0]);
  for(let i=0;i<38;i++){
    const angle=Math.random()*Math.PI*2,dist=cellSize*(0.4+Math.random()*4.5);
    const x=cx+Math.cos(angle)*dist,y=cy+Math.sin(angle)*dist,size=cellSize*(0.08+Math.random()*0.55);
    if(x>0&&x<W&&y>0&&y<H)drawBlot(sCtx,x,y,size,cols[~~(Math.random()*cols.length)]);
  }
  for(let i=0;i<12;i++){
    const angle=Math.random()*Math.PI*2,sd=cellSize*(0.3+Math.random()*1.5);
    const sx2=cx+Math.cos(angle)*sd,sy2=cy+Math.sin(angle)*sd;
    const len=cellSize*(0.5+Math.random()*2.5);
    const ex=sx2+Math.cos(angle)*len*0.4+(Math.random()-0.5)*cellSize*0.5;
    const ey=sy2+Math.sin(angle)*len+(Math.random()-0.5)*cellSize*0.3;
    if(sx2>0&&sx2<W&&sy2>0&&sy2<H)drawDrip(sCtx,sx2,sy2,ex,ey,cellSize*(0.05+Math.random()*0.14),cols[~~(Math.random()*cols.length)]);
  }
  for(let i=0;i<22;i++){
    const angle=Math.random()*Math.PI*2,dist=cellSize*(2+Math.random()*5);
    const x=cx+Math.cos(angle)*dist,y=cy+Math.sin(angle)*dist;
    if(x>4&&x<W-4&&y>4&&y<H-4)drawBlot(sCtx,x,y,cellSize*(0.04+Math.random()*0.18),cols[~~(Math.random()*cols.length)]);
  }
}

/* ── 오버레이 박스 얼룩 (방울만, 선 없음) ── */
function drawOverlaySplatter(){
  resizeOverlayCanvas();
  const W=oCanvas.width,H=oCanvas.height;
  const cols=[
    'rgba(110,50,0,0.78)','rgba(140,70,5,0.70)','rgba(80,30,0,0.85)',
    'rgba(160,85,5,0.60)','rgba(50,20,0,0.90)','rgba(130,65,0,0.72)'
  ];

  // 모서리 큰 얼룩
  const corners=[
    {x:W*0.06, y:H*0.10, r:W*0.14},
    {x:W*0.88, y:H*0.08, r:W*0.11},
    {x:W*0.90, y:H*0.82, r:W*0.10},
    {x:W*0.10, y:H*0.85, r:W*0.12},
  ];
  for(const s of corners)drawBlot(oCtx,s.x,s.y,s.r,cols[~~(Math.random()*cols.length)]);

  // 테두리 근처 중간 얼룩
  const edge=[
    {x:W*0.48, y:H*0.06, r:W*0.08},
    {x:W*0.72, y:H*0.88, r:W*0.07},
    {x:W*0.25, y:H*0.92, r:W*0.06},
    {x:W*0.93, y:H*0.45, r:W*0.07},
    {x:W*0.04, y:H*0.50, r:W*0.06},
  ];
  for(const s of edge)drawBlot(oCtx,s.x,s.y,s.r,cols[~~(Math.random()*cols.length)]);

  // 중앙부 작은 방울들 (흩뿌려진 느낌)
  for(let i=0;i<20;i++){
    const x=W*(0.08+Math.random()*0.84),y=H*(0.08+Math.random()*0.84);
    const r=W*(0.015+Math.random()*0.042);
    drawBlot(oCtx,x,y,r,cols[~~(Math.random()*cols.length)]);
  }
}

/* ── 파티클 폭발 ── */
function spawnExplosion(hitR,hitC){
  resizeCanvas();
  const W=sCanvas.width;
  const pad=12,cellSize=(W-pad*2-4*7)/8,gap=4;
  const cx=pad+hitC*(cellSize+gap)+cellSize/2,cy=pad+hitR*(cellSize+gap)+cellSize/2;
  const custard=['#ffe566','#ffd030','#f5bc18','#ffe8a0','#fff3cc'];
  const caramel=['#c87010','#9a5005','#e09820','#d08010','#7a3800'];
  const cream=['#fffbea','#fff6c8','#fef0a0'];
  for(let i=0;i<180;i++){
    const angle=Math.random()*Math.PI*2,speed=1+Math.random()*11,size=3+Math.random()*16;
    const t=Math.random();
    const color=t<0.35?custard[~~(Math.random()*custard.length)]:t<0.7?caramel[~~(Math.random()*caramel.length)]:cream[~~(Math.random()*cream.length)];
    const isSplat=Math.random()<0.4,isDrip=Math.random()<0.25;
    pudParticles.push({x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-Math.random()*5,size,color,alpha:1,gravity:0.2+Math.random()*0.28,wobble:Math.random()*Math.PI*2,wobbleSpeed:0.07+Math.random()*0.2,sx:0.55+Math.random()*0.8,sy:0.55+Math.random()*0.8,isSplat,isDrip,life:0,maxLife:50+Math.random()*55,rot:Math.random()*Math.PI*2,rotS:(Math.random()-0.5)*0.2,dripLen:isDrip?8+Math.random()*22:0});
  }
  animatePudding();
  setTimeout(()=>drawBoardSplatter(hitR,hitC),300);
}
function animatePudding(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pudParticles=pudParticles.filter(p=>p.alpha>0.02&&p.life<p.maxLife);
  for(const p of pudParticles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=0.97;p.wobble+=p.wobbleSpeed;
    p.life++;p.alpha=1-(p.life/p.maxLife);p.rot+=p.rotS;
    ctx.save();ctx.globalAlpha=p.alpha;
    if(p.isDrip){
      ctx.translate(p.x,p.y);ctx.fillStyle=p.color;
      ctx.beginPath();ctx.ellipse(0,0,p.size*0.5,p.size*0.75,0,0,Math.PI*2);ctx.fill();
      const dy=p.size*0.6+p.dripLen*(p.life/p.maxLife)*1.2;
      ctx.beginPath();ctx.moveTo(-p.size*0.38,p.size*0.55);ctx.quadraticCurveTo(0,dy,p.size*0.38,p.size*0.55);ctx.fill();
    } else {
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      const wob=Math.sin(p.wobble)*0.28,r=p.size*(1-(p.life/p.maxLife)*0.28);
      if(p.isSplat){ctx.scale(p.sx+wob,p.sy-wob*0.5);ctx.beginPath();drawBlobP(ctx,0,0,r,6);}
      else{ctx.scale(1+wob*0.25,1-wob*0.18);ctx.beginPath();ctx.ellipse(0,0,r,r,0,0,Math.PI*2);}
      ctx.fillStyle=p.color;ctx.fill();
      ctx.beginPath();ctx.ellipse(-r*0.25,-r*0.28,r*0.28,r*0.18,-0.6,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.55)';ctx.fill();
    }
    ctx.restore();
  }
  if(pudParticles.length>0)rafId=requestAnimationFrame(animatePudding);
  else ctx.clearRect(0,0,canvas.width,canvas.height);
}
function drawBlobP(c,x,y,r,pts){
  for(let i=0;i<pts*2;i++){const a=(i/(pts*2))*Math.PI*2,rad=r*(i%2===0?1:0.48+Math.random()*0.38),px=x+Math.cos(a)*rad,py=y+Math.sin(a)*rad;i===0?c.moveTo(px,py):c.lineTo(px,py);}c.closePath();
}
function endGame(win,hitR,hitC){
  gameState=win?'won':'lost';clearInterval(timerInterval);
  setFace(win?'happy':'dead');
  if(!win){
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]===-1&&!flagged[r][c])revealed[r][c]=true;
    render();spawnExplosion(hitR,hitC);
    setTimeout(()=>{
      document.getElementById('overlay-title').textContent='💥 푸딩이 터졌어요!';
      document.getElementById('overlay-sub').textContent='캐러멜 소스가 사방에... 다시 도전!';
      document.getElementById('overlay').classList.add('show');
      requestAnimationFrame(()=>requestAnimationFrame(()=>drawOverlaySplatter()));
    },1000);
  } else {
    render();
    document.getElementById('overlay-title').textContent='🍮 클리어!';
    document.getElementById('overlay-sub').textContent=`${seconds}초 만에 푸딩을 모두 찾았어요!`;
    document.getElementById('overlay').classList.add('show');
  }
}
function handleClick(r,c){
  if(gameState==='won'||gameState==='lost')return;
  if(flagged[r][c]||revealed[r][c])return;
  if(firstClick){firstClick=false;placeMines(r,c);gameState='playing';startTimer();}
  if(board[r][c]===-1){revealed[r][c]=true;const el=getCellEl(r,c);if(el)el.classList.add('pop');endGame(false,r,c);return;}
  reveal(r,c);render();if(checkWin())endGame(true);
}
let longPressTimer=null;
function handleTouchStart(e,r,c){longPressTimer=setTimeout(()=>handleRightClick({preventDefault:()=>{}},r,c),500);}
function handleTouchEnd(){clearTimeout(longPressTimer);}
function handleRightClick(e,r,c){
  e.preventDefault();if(gameState==='won'||gameState==='lost')return;if(revealed[r][c])return;
  flagged[r][c]=!flagged[r][c];
  const el=getCellEl(r,c);if(el&&flagged[r][c]){el.classList.remove('jiggle');void el.offsetWidth;el.classList.add('jiggle');}
  updateMineCount();render();
}
function render(){
  const bd=document.getElementById('board');
  if(bd.querySelectorAll('.cell').length!==ROWS*COLS){
    bd.innerHTML='';
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const el=document.createElement('div');el.className='cell hidden';el.dataset.r=r;el.dataset.c=c;
      el.addEventListener('click',()=>handleClick(r,c));
      el.addEventListener('contextmenu',(e)=>handleRightClick(e,r,c));
      el.addEventListener('touchstart', (e) => {
  handleTouchStart(e, r, c);
}, {passive: true}); // 스크롤 방해 없이 터치만 인식
      el.addEventListener('touchend',handleTouchEnd);
      el.addEventListener('touchmove',handleTouchEnd);
      bd.appendChild(el);
    }
  }
  const all=bd.querySelectorAll('.cell');
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const el=all[r*COLS+c],wasJ=el.classList.contains('jiggle');
    el.className='cell'+(wasJ?' jiggle':'');el.textContent='';
    if(revealed[r][c]){
      const v=board[r][c];
      if(v===-1){el.classList.add('mine-hit');el.textContent='🍮';}
      else{el.classList.add('revealed');if(v>0){el.textContent=v;el.classList.add('n'+v);}}
    } else if(flagged[r][c]){
      el.classList.add('flagged');el.textContent='🚩';
      if(gameState==='lost'&&board[r][c]!==-1)el.classList.add('wrong-flag');
    } else el.classList.add('hidden');
  }
}
document.getElementById('reset-btn').addEventListener('click',initBoard);
document.getElementById('start-btn').addEventListener('click',()=>{
  document.getElementById('start-screen').style.display='none';
  document.getElementById('panel').style.display='flex';
  document.getElementById('board-wrap').style.display='block';
  initBoard();setTimeout(resizeCanvas,80);
});
initBoard();setTimeout(resizeCanvas,100);
</script>
