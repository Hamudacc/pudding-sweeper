<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>커스터드 푸딩 지뢰찾기</title>
<style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family: sans-serif; background: #fffdf0;}
    #app{display:flex;flex-direction:column;align-items:center;padding:12px 8px}
    #panel{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:430px;background:#fff8e1;border:2px solid #e6a800;border-radius:20px;padding:8px 20px;margin-bottom:10px;box-shadow:0 4px 0 #b87800,inset 0 1px 0 rgba(255,255,255,0.9)}
    .info-label{font-size:11px;color:#8a5e10;letter-spacing:0.04em;font-weight:600}
    .info-value{font-size:22px;font-weight:700;color:#6b3e08;font-variant-numeric:tabular-nums;min-width:44px;text-align:center}
    .info-box{display:flex;flex-direction:column;align-items:center;gap:1px}
    #reset-btn{width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s;flex-shrink:0;background:transparent;padding:0}
    #reset-btn:hover{transform:scale(1.12) rotate(-4deg)}
    #reset-btn:active{transform:scale(0.9)}
    #reset-btn svg{width:72px;height:72px;display:block;overflow:visible}
    #board-wrap { position: relative; background: linear-gradient(160deg,#fff3c0,#ffe680); border: 2.5px solid #d4a030; border-radius: 24px; padding: 12px; display: inline-block; box-shadow: 0 6px 0 #b07818, inset 0 2px 6px rgba(255,255,200,0.8); width: 100%; max-width: 440px; box-sizing: border-box;}
    #board { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; width: 100%; }
    .cell { width: 100%; aspect-ratio: 1 / 1; border-radius: 12px; border: none; cursor: pointer; font-size: 15px; font-weight: 700; display: flex; align-items: center; justify-content: center; user-select: none; position: relative; overflow: hidden; transition: transform 0.12s, box-shadow 0.12s; flex-shrink: 0;}
    .cell.hidden{background:#f0a800;box-shadow:0 5px 0 #a06800,0 6px 8px rgba(120,70,0,0.3),inset 0 1px 0 rgba(255,220,80,0.9),inset 0 -2px 4px rgba(140,80,0,0.4)}
    .cell.hidden::before{content:'';position:absolute;top:3px;left:6px;right:6px;height:40%;background:linear-gradient(180deg,rgba(255,255,255,0.6) 0%,rgba(255,255,255,0) 100%);border-radius:50% 50% 50% 50% / 80% 80% 20% 20%;pointer-events:none}
    .cell.hidden:hover{transform:scale(1.14) translateY(-3px);background:#ffb800;box-shadow:0 8px 0 #a06800}
    .cell.revealed{background:rgba(255,235,130,0.38);box-shadow:inset 0 2px 5px rgba(160,100,0,0.22);cursor:default;border-radius:9px}
    .cell.mine-hit{background:linear-gradient(145deg,#ff8844,#ff4400);box-shadow:0 4px 0 #cc2200;font-size:18px}
    .n1{color:#1a4db3}.n2{color:#1a7a38}.n3{color:#b01a1a}.n4{color:#3a1a99}.n5{color:#993300}.n6{color:#006688}.n7{color:#443300}.n8{color:#223344}
    #overlay{position:absolute;inset:0;border-radius:22px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:50}
    #overlay.show{display:flex}
    #overlay-bg{position:absolute;inset:0;background:rgba(60,30,0,0.6);backdrop-filter:blur(3px)}
    #overlay-box{position:relative;z-index:2;background:#fff8e1;border:2.5px solid #e6a800;border-radius:22px;padding:22px 36px;text-align:center;box-shadow:0 6px 0 #b07818}
    #pudding-canvas{position:absolute;inset:0;pointer-events:none;z-index:40;border-radius:22px}
    .face{display:none}.face.active{display:block}
    
    /* 시작 화면 스타일 */
    #start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; width: 100%; max-width: 440px; min-height: 320px; text-align: center; background: #fff8e1; border: 2.5px solid #e6a800; border-radius: 24px; box-shadow: 0 6px 0 #b07818; margin-bottom: 15px; }
    #start-btn { padding: 14px 36px; font-size: 16px; font-weight: 700; color: #ffffff; background: linear-gradient(145deg, #ffb800, #f0a800); border: none; border-radius: 16px; cursor: pointer; box-shadow: 0 5px 0 #a06800; margin-top: 20px; }
    #start-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #a06800; }
</style>
</head>
<body>

<div id="app">
    <div id="start-screen">
        <div class="start-logo">
            <svg viewBox="0 0 100 100" style="width: 120px; height: 120px;">
                <path d="M 25 75 Q 20 75 25 45 Q 40 40 50 40 Q 60 40 75 45 Q 80 75 75 75 Q 50 82 25 75 Z" fill="#FFEB80" stroke="#6B3E08" stroke-width="3" />
                <path d="M 25 45 Q 23 32 50 31 Q 77 32 75 45 Q 50 53 25 45 Z" fill="#995500" stroke="#6B3E08" stroke-width="3" />
                <path d="M 30.5 41.8 Q 40 44.7 50 44.5" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
                <circle cx="54.1" cy="44.2" r="1.3" fill="#FFFFFF" opacity="0.8"/>
            </svg>
            <h1 class="game-title">커스터드 푸딩 지뢰찾기</h1>
        </div>
        <button id="start-btn">게임 시작하기</button>
    </div>

    <div id="panel" style="display: none;">
        <div class="info-box"><span class="info-label">💣 남은 지뢰</span><span class="info-value" id="mine-count">10</span></div>
        <button id="reset-btn">
            <svg viewBox="0 0 100 100">
                <path d="M 25 75 Q 20 75 25 45 Q 40 40 50 40 Q 60 40 75 45 Q 80 75 75 75 Q 50 82 25 75 Z" fill="#FFEB80" stroke="#6B3E08" stroke-width="3.5" />
                <path d="M 25 45 Q 23 32 50 31 Q 77 32 75 45 Q 50 53 25 45 Z" fill="#995500" stroke="#6B3E08" stroke-width="3.5" />
                <path d="M 30.5 41.8 Q 40 44.7 50 44.5" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
                <circle cx="54.1" cy="44.2" r="1.3" fill="#FFFFFF" opacity="0.8"/>
                <g class="face active" id="face-normal">
                    <circle cx="42" cy="57" r="3" fill="#6B3E08"/><circle cx="58" cy="57" r="3" fill="#6B3E08"/>
                    <path d="M 47 62 Q 50 65 53 62" stroke="#6B3E08" stroke-width="3" fill="none" stroke-linecap="round"/>
                </g>
                <g class="face" id="face-dead">
                    <path d="M 39 55 L 44 59 L 39 63" stroke="#6B3E08" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <path d="M 61 55 L 56 59 L 61 63" stroke="#6B3E08" stroke-width="3" fill="none" stroke-linecap="round"/>
                </g>
            </svg>
        </button>
        <div class="info-box"><span class="info-label">⏱ 시간</span><span class="info-value" id="timer">0</span></div>
    </div>
    <div id="board-wrap" style="display: none;">
        <div id="board"></div>
        <canvas id="pudding-canvas"></canvas>
        <div id="overlay"><div id="overlay-bg"></div><div id="overlay-box"><span id="overlay-title"></span><span id="overlay-sub"></span></div></div>
    </div>
</div>

<script>
    const ROWS=8, COLS=8, MINES=10;
    let board=[],revealed=[],flagged=[],gameState='idle',timerInterval=null,seconds=0,firstClick=true;
    const canvas=document.getElementById('pudding-canvas');
    const ctx=canvas.getContext('2d');

    function resizeCanvas(){const w=document.getElementById('board-wrap');if(w){canvas.width=w.offsetWidth;canvas.height=w.offsetHeight;}}
    function setFace(name){document.querySelectorAll('#reset-btn .face').forEach(f=>f.classList.remove('active'));document.getElementById('face-'+name).classList.add('active');}
    
    function initBoard(){
        board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
        revealed=Array.from({length:ROWS},()=>Array(COLS).fill(false));
        flagged=Array.from({length:ROWS},()=>Array(COLS).fill(false));
        gameState='idle'; firstClick=true; seconds=0; clearInterval(timerInterval);
        document.getElementById('timer').textContent='0';
        document.getElementById('mine-count').textContent=MINES;
        setFace('normal');
        document.getElementById('overlay').classList.remove('show');
        render();
    }

    function render(){
        const bd=document.getElementById('board');
        bd.innerHTML='';
        for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
            const el=document.createElement('div');
            el.className='cell '+(revealed[r][c]?'revealed':flagged[r][c]?'hidden':'hidden');
            el.onclick=()=>handleClick(r,c);
            el.oncontextmenu=(e)=>{e.preventDefault(); handleRightClick(r,c);};
            if(revealed[r][c] && board[r][c] !== 0) el.textContent=board[r][c];
            if(revealed[r][c] && board[r][c] === -1) el.textContent='💣';
            if(flagged[r][c]) el.textContent='🚩';
            bd.appendChild(el);
        }
    }

    function handleClick(r,c){
        if(firstClick){ firstClick=false; placeMines(r,c); timerInterval=setInterval(()=>document.getElementById('timer').textContent=++seconds,1000); }
        if(board[r][c]===-1) { endGame(false); return; }
        revealed[r][c]=true; render();
    }

    function handleRightClick(r,c){ flagged[r][c]=!flagged[r][c]; render(); }
    
    function placeMines(safeR, safeC){
        let placed=0;
        while(placed < MINES){
            let r=Math.floor(Math.random()*ROWS), c=Math.floor(Math.random()*COLS);
            if(board[r][c] !== -1 && !(r===safeR && c===safeC)) { board[r][c]=-1; placed++; }
        }
    }

    function endGame(win){ gameState=win?'won':'lost'; clearInterval(timerInterval); setFace(win?'happy':'dead'); render(); }

    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('panel').style.display = 'flex';
        document.getElementById('board-wrap').style.display = 'inline-block';
        initBoard();
    });
    document.getElementById('reset-btn').addEventListener('click', initBoard);
</script>
</body>
</html>
